<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OpenLayers - Sync Maps</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: sans-serif; overflow: hidden; }
        .map-container { flex: 1; height: 100%; border-right: 2px solid #ccc; }
        .map-container:last-child { border-right: none; }
        .controls { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>
    <div class="controls">
        <strong>Synchronized Maps</strong><br/>
        Pan or zoom one map, and the other will follow.
    </div>
    <div id="map1" class="map-container"></div>
    <div id="map2" class="map-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script src="sync-maps.js"></script>
</body>
</html>
