<!DOCTYPE html>
<html>
<head>
    <title>OpenLayers - Overlay/Popup</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        body, html, #map { margin: 0; height: 100%; width: 100%; font-family: sans-serif; }
        .ol-popup {
            position: absolute; background-color: white; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            padding: 15px; border-radius: 10px; border: 1px solid #cccccc;
            bottom: 12px; left: -50px; min-width: 200px;
        }
        .ol-popup:after, .ol-popup:before {
            top: 100%; border: solid transparent; content: " "; height: 0; width: 0; position: absolute; pointer-events: none;
        }
        .ol-popup:after { border-top-color: white; border-width: 10px; left: 48px; margin-left: -10px; }
        .ol-popup:before { border-top-color: #cccccc; border-width: 11px; left: 48px; margin-left: -11px; }
        .ol-popup-closer { text-decoration: none; position: absolute; top: 2px; right: 8px; font-weight: bold; }
        .ol-popup-closer:after { content: "✖"; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="popup" class="ol-popup">
        <a href="#" id="popup-closer" class="ol-popup-closer"></a>
        <div id="popup-content"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script src="popup-tooltip.js"></script>
</body>
</html>
