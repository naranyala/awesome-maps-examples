<!DOCTYPE html>
<html>
<head>
    <title>OpenLayers - Custom Controls</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        body, html, #map { margin: 0; height: 100%; width: 100%; font-family: sans-serif; }
        .rotate-north { top: 65px; left: .5em; }
        .ol-touch .rotate-north { top: 80px; }
        .custom-control { position: absolute; background: white; padding: 2px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script src="custom-controls.js"></script>
</body>
</html>
