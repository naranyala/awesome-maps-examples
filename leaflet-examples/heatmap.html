<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Heatmap</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .controls { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 12px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .controls label { display: block; margin-bottom: 8px; font-size: 13px; }
    </style>
</head>
<body>
    
    <div class="controls">
        <label>Radius: <input type="range" id="radius" min="5" max="50" value="25"></label>
        <label>Blur: <input type="range" id="blur" min="5" max="50" value="15"></label>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);

        const heatData = [];
        for (let i = 0; i < 200; i++) {
            heatData.push([51.505 + (Math.random() - 0.5) * 0.12, -0.09 + (Math.random() - 0.5) * 0.12, Math.random()]);
        }

        const heat = L.heatLayer(heatData, { radius: 25, blur: 15, maxZoom: 17 }).addTo(map);

        document.getElementById('radius').addEventListener('input', (e) => { heat.setOptions({ radius: parseInt(e.target.value) }); heat.redraw(); });
        document.getElementById('blur').addEventListener('input', (e) => { heat.setOptions({ blur: parseInt(e.target.value) }); heat.redraw(); });
    </script>
</body>
</html>
