<!DOCTYPE html>
<html>
<head>
    <title>Leaflet + Turf.js - Point in Polygon</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .instructions { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.85); color: white; padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); max-width: 280px; font-size: 13px; line-height: 1.5; }
        .result { padding: 6px 10px; border-radius: 4px; margin-top: 8px; font-weight: bold; }
        .result.inside { background: rgba(16,185,129,0.2); color: #10b981; }
        .result.outside { background: rgba(239,68,68,0.2); color: #ef4444; }
    </style>
</head>
<body>
    <div class="instructions">
        <strong>🎯 Point in Polygon</strong><br>
        Click anywhere to test if the point is inside the polygon.
        <div id="result"></div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
        
        // Create a sample polygon
        const polygon = turf.polygon([[
            [-0.2, 51.45], [-0.05, 51.45], [-0.05, 51.55], [-0.2, 51.55], [-0.2, 51.45]
        ]]);
        
        L.geoJSON(polygon, {
            style: { color: '#3b82f6', weight: 2, fillColor: '#3b82f6', fillOpacity: 0.15 }
        }).addTo(map).bindPopup('Target Polygon');
        
        let testMarker = null;
        
        map.on('click', function(e) {
            if (testMarker) map.removeLayer(testMarker);
            
            const pt = turf.point([e.latlng.lng, e.latlng.lat]);
            const inside = turf.booleanPointInPolygon(pt, polygon);
            
            testMarker = L.circleMarker(e.latlng, {
                radius: 8,
                color: inside ? '#10b981' : '#ef4444',
                fillColor: inside ? '#10b981' : '#ef4444',
                fillOpacity: 0.8,
                weight: 2
            }).addTo(map).bindPopup(inside ? '✅ Inside polygon' : '❌ Outside polygon').openPopup();
            
            document.getElementById('result').innerHTML = `<div class="result ${inside ? 'inside' : 'outside'}">${inside ? '✅ Inside' : '❌ Outside'}</div>`;
        });
    </script>
</body>
</html>
