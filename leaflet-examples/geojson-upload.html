<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - GeoJSON Upload</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .drop-zone { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 320px; padding: 40px; background: rgba(15,23,42,.85); color: #fff; border: 2px dashed rgba(255,255,255,.3); border-radius: 16px; text-align: center; pointer-events: auto; }
        .drop-zone.dragover { border-color: #3b82f6; background: rgba(59,130,246,.2); }
        .drop-zone p { margin: 0; font-size: 15px; }
        .drop-zone small { color: #94a3b8; }
        .feature-count { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15,23,42,.85); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 13px; display: none; }
    </style>
</head>
<body>
    <div class="feature-count" id="feature-count"></div>
    <div class="drop-zone" id="drop-zone">
        <p>📁 Drop a GeoJSON file here</p>
        <small>or click to select</small>
        <input type="file" id="file-input" accept=".geojson,.json" style="display:none">
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
        const geoLayer = L.geoJSON(null, {
            style: { color: '#3b82f6', weight: 2, fillOpacity: 0.3, fillColor: 'rgba(59,130,246,0.4)' },
            pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius: 6, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 1 })
        }).addTo(map);

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const geojson = JSON.parse(e.target.result);
                    geoLayer.clearLayers();
                    geoLayer.addData(geojson);
                    const count = geoLayer.getLayers().length;
                    document.getElementById('feature-count').textContent = '✅ ' + count + ' feature(s) loaded';
                    document.getElementById('feature-count').style.display = 'block';
                    map.fitBounds(geoLayer.getBounds(), { padding: [50, 50], maxZoom: 15 });
                    dropZone.style.display = 'none';
                } catch (err) { alert('Invalid GeoJSON file'); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
