<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Time Slider</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .slider-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(15,23,42,.9); color: #fff; padding: 12px 20px; border-radius: 10px; text-align: center; min-width: 300px; }
        .slider-panel input[type=range] { width: 100%; }
        .slider-panel .time-label { font-size: 15px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="slider-panel">
        <input type="range" id="slider" min="0" max="23" value="12" oninput="updateTime(this.value)">
        <div class="time-label" id="time-label">12:00</div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
        const layer = L.layerGroup().addTo(map);

        const hourlyData = [];
        for (let h = 0; h < 24; h++) {
            const pts = [];
            for (let i = 0; i < 30; i++) {
                pts.push({
                    lat: 51.505 + (Math.random() - 0.5) * 0.08,
                    lng: -0.09 + (Math.random() - 0.5) * 0.1,
                    intensity: Math.max(0, Math.sin((h - 6) * Math.PI / 12) + Math.random() * 0.3)
                });
            }
            hourlyData.push(pts);
        }

        function updateTime(h) {
            const hour = parseInt(h);
            document.getElementById('time-label').textContent = hour.toString().padStart(2, '0') + ':00';
            layer.clearLayers();
            hourlyData[hour].forEach(p => {
                const color = p.intensity > 0.7 ? '#ef4444' : p.intensity > 0.3 ? '#f59e0b' : '#3b82f6';
                L.circleMarker([p.lat, p.lng], { radius: 3 + p.intensity * 10, color, fillColor: color, fillOpacity: 0.7 }).addTo(layer);
            });
        }
        updateTime(12);
    </script>
</body>
</html>
