<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - WASD Navigation</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100%; width: 100%; }
        .controls { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-family: sans-serif; }
    </style>
</head>
<body>
    
    <div class="controls">
        <strong>WASD Navigation</strong><br/>
        Click the map to focus, then use W, A, S, D to pan.
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const panStep = 50; // pixels to pan
        let keys = {};

        // Focus map to allow keyboard events
        map.getContainer().focus();

        document.addEventListener('keydown', (e) => {
            if (['w', 'a', 's', 'd'].includes(e.key.toLowerCase())) {
                keys[e.key.toLowerCase()] = true;
                panMap();
            }
        });

        document.addEventListener('keyup', (e) => {
             if (['w', 'a', 's', 'd'].includes(e.key.toLowerCase())) {
                keys[e.key.toLowerCase()] = false;
             }
        });

        function panMap() {
            let dx = 0;
            let dy = 0;
            if (keys['a']) dx -= panStep;
            if (keys['d']) dx += panStep;
            if (keys['w']) dy -= panStep;
            if (keys['s']) dy += panStep;

            if (dx !== 0 || dy !== 0) {
                map.panBy([dx, dy], { animate: true, duration: 0.1 });
            }
        }
    </script>
</body>
</html>
