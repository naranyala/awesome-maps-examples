<!DOCTYPE html>
<html>
<head>
    <title>Leaflet + Turf.js - Buffer Analysis</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .instructions { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.85); color: white; padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); pointer-events: none; }
    </style>
</head>
<body>
    <div class="instructions">Click anywhere to calculate a 10km Turf.js buffer</div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

        let bufferLayer = null;

        map.on('click', function(e) {
            if (bufferLayer) map.removeLayer(bufferLayer);
            
            // 1. Create a Turf Point
            const pt = turf.point([e.latlng.lng, e.latlng.lat]);
            
            // 2. Calculate 10km buffer
            const buffered = turf.buffer(pt, 10, { units: 'kilometers' });
            
            // 3. Add to map
            bufferLayer = L.geoJSON(buffered, {
                style: { color: '#ef4444', weight: 2, fillColor: '#ef4444', fillOpacity: 0.2 }
            }).addTo(map);
            
            // Add center marker
            L.marker(e.latlng).addTo(bufferLayer);
        });
    </script>
</body>
</html>
