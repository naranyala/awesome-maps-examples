<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Mini Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; display: flex; }
        #mainMap { flex: 1; }
        #miniMap { width: 200px; height: 150px; position: absolute; bottom: 10px; right: 10px; border: 2px solid #333; border-radius: 4px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="mainMap"></div>
    <div id="miniMap"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const london = [51.5074, -0.1275];
        const mainMap = L.map('mainMap', { zoomControl: true }).setView(london, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(mainMap);

        const miniMap = L.map('miniMap', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false, touchZoom: false }).setView(london, 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(miniMap);

        mainMap.on('move', function () {
            miniMap.setView(mainMap.getCenter(), mainMap.getZoom() - 4, { animate: false });
        });
    </script>
</body>
</html>
