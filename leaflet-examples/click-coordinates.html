{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    .coord-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .coord-label { color: var(--text-muted); font-size: 0.9rem; }
    .coord-value { font-size: 1.2rem; font-weight: 600; font-variant-numeric: tabular-nums; color: #ef4444; }
    #map { cursor: crosshair; }
    .leaflet-popup-content-wrapper { background: var(--panel-bg); color: white; border-radius: 8px; backdrop-filter: blur(8px); border: 1px solid var(--border-color); }
    .leaflet-popup-tip { background: var(--panel-bg); }
    .leaflet-popup-content { font-family: 'Inter', sans-serif; font-weight: 500; text-align: center; margin: 10px 14px; }
</style>
{% endblock %}

{% block controls %}
<p><strong>Click Coordinates</strong><br>Click anywhere on the map to see the coordinates update.</p>
<div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-top: 20px;">
    <div class="coord-row">
        <span class="coord-label">Latitude</span>
        <span class="coord-value" id="lat-val">--</span>
    </div>
    <div class="coord-row" style="margin-bottom: 0;">
        <span class="coord-label">Longitude</span>
        <span class="coord-value" id="lng-val">--</span>
    </div>
</div>
{% endblock %}

{% block script %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([51.505, -0.09], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const latEl = document.getElementById('lat-val');
    const lngEl = document.getElementById('lng-val');
    let popup = L.popup();

    map.on('click', function(e) {
        latEl.textContent = e.latlng.lat.toFixed(5);
        lngEl.textContent = e.latlng.lng.toFixed(5);
        
        popup
            .setLatLng(e.latlng)
            .setContent("Copied!<br><span style='color:#ef4444;font-size:0.85em;margin-top:4px;display:block'>" + e.latlng.lat.toFixed(4) + ", " + e.latlng.lng.toFixed(4) + "</span>")
            .openOn(map);
    });
</script>
{% endblock %}
