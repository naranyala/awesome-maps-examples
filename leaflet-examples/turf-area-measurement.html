<!DOCTYPE html>
<html>
<head>
    <title>Leaflet + Turf.js - Area Measurement</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .instructions { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.85); color: white; padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); max-width: 280px; font-size: 13px; line-height: 1.5; }
        #area-display { margin-top: 10px; padding: 8px; background: rgba(59,130,246,0.2); border-radius: 4px; font-size: 14px; font-weight: bold; color: #60a5fa; }
    </style>
</head>
<body>
    <div class="instructions">
        <strong>📐 Area Measurement</strong><br>
        Click to draw polygon vertices. Double-click to finish.
        <div id="area-display">Area: 0 km²</div>
        <button onclick="clearPolygon()" style="margin-top:8px;padding:4px 8px;border-radius:4px;border:none;background:#ef4444;color:white;cursor:pointer;font-size:12px;">Clear</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
        
        let vertices = [];
        let markers = [];
        let polygonLayer = null;
        
        map.on('click', function(e) {
            vertices.push([e.latlng.lng, e.latlng.lat]);
            markers.push(L.circleMarker(e.latlng, { radius: 5, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.8 }).addTo(map));
            
            if (vertices.length >= 3) {
                if (polygonLayer) map.removeLayer(polygonLayer);
                const ring = [...vertices, vertices[0]];
                const poly = turf.polygon([ring]);
                polygonLayer = L.geoJSON(poly, { style: { color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.2, weight: 2 } }).addTo(map);
                
                const area = turf.area(poly);
                const km2 = (area / 1e6).toFixed(3);
                document.getElementById('area-display').textContent = `Area: ${km2} km²`;
            }
        });
        
        function clearPolygon() {
            vertices = [];
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (polygonLayer) map.removeLayer(polygonLayer);
            document.getElementById('area-display').textContent = 'Area: 0 km²';
        }
    </script>
</body>
</html>
