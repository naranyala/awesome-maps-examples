<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Realtime Data</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .status { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(15,23,42,.85); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; }
        .live-dot { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; margin-right: 6px; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body>
    <div class="status"><span class="live-dot"></span><span id="count">0</span> points live</div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
        const markers = L.layerGroup().addTo(map);

        function addRandomPoint() {
            const lat = 51.505 + (Math.random() - 0.5) * 0.08;
            const lng = -0.09 + (Math.random() - 0.5) * 0.1;
            L.circleMarker([lat, lng], { radius: 5, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 1 }).addTo(markers);
            if (markers.getLayers().length > 50) markers.removeLayer(markers.getLayers()[0]);
            document.getElementById('count').textContent = markers.getLayers().length;
        }

        for (let i = 0; i < 10; i++) addRandomPoint();
        setInterval(addRandomPoint, 800);
    </script>
</body>
</html>
