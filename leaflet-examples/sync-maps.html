<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Sync Multiple Maps</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; display: flex; }
        .map-container { flex: 1; height: 100%; border-right: 2px solid #ccc; }
        .map-container:last-child { border-right: none; }
        .controls { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>
    
    <div class="controls">
        <strong>Synchronized Maps</strong><br/>
        Pan or zoom one map, and the other will follow.
    </div>
    <div id="map1" class="map-container"></div>
    <div id="map2" class="map-container"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const center = [51.505, -0.09];
        const zoom = 13;

        const map1 = L.map('map1').setView(center, zoom);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map1);

        const map2 = L.map('map2').setView(center, zoom);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri'
        }).addTo(map2);

        // Simple manual sync implementation
        let isSyncingLeft = false;
        let isSyncingRight = false;

        map1.on('move', () => {
            if (!isSyncingLeft) {
                isSyncingRight = true;
                map2.setView(map1.getCenter(), map1.getZoom(), { animate: false });
            }
            isSyncingLeft = false;
        });

        map2.on('move', () => {
            if (!isSyncingRight) {
                isSyncingLeft = true;
                map1.setView(map2.getCenter(), map2.getZoom(), { animate: false });
            }
            isSyncingRight = false;
        });
    </script>
</body>
</html>
