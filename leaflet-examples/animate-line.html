<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Animate Line</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .controls { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 12px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .controls button { padding: 8px 16px; border: none; border-radius: 4px; background: #3b82f6; color: white; cursor: pointer; font-size: 13px; }
        .controls button:hover { background: #2563eb; }
        .controls button:disabled { background: #94a3b8; cursor: default; }
    </style>
</head>
<body>
    <div class="controls">
        <button id="playBtn" onclick="animateLine()">▶ Play Animation</button>
        <button onclick="resetLine()">↺ Reset</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const route = [[51.505, -0.09], [51.51, -0.08], [51.515, -0.07], [51.52, -0.05], [51.518, -0.03], [51.525, -0.01], [51.52, 0.01], [51.515, 0.03], [51.51, 0.05], [51.505, 0.07], [51.5, 0.09], [51.495, 0.11]];

        const map = L.map('map').setView([51.51, 0.01], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

        const lineLayer = L.layerGroup().addTo(map);
        const marker = L.circleMarker(route[0], { radius: 6, color: '#f44343', fillColor: '#f44343', fillOpacity: 1 }).addTo(map);
        let animating = false;

        function animateLine() {
            if (animating) return;
            animating = true;
            document.getElementById('playBtn').disabled = true;
            lineLayer.clearLayers();
            let step = 0;
            const coords = [];

            function frame() {
                coords.push(route[step]);
                lineLayer.clearLayers();
                L.polyline(coords, { color: '#3b82f6', weight: 3 }).addTo(lineLayer);
                marker.setLatLng(route[step]);
                step++;
                if (step < route.length) requestAnimationFrame(frame);
                else animating = false;
            }
            frame();
        }

        function resetLine() {
            animating = false;
            document.getElementById('playBtn').disabled = false;
            lineLayer.clearLayers();
            marker.setLatLng(route[0]);
        }
    </script>
</body>
</html>
