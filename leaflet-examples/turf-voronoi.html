<!DOCTYPE html>
<html>
<head>
    <title>Leaflet + Turf.js - Voronoi Diagram</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .instructions { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.85); color: white; padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); max-width: 250px; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="instructions">
        <strong>📍 Voronoi Diagram</strong><br>
        Click to add points. Voronoi polygons update automatically.
        <br><br>
        <button onclick="clearPoints()" style="padding:4px 8px;border-radius:4px;border:none;background:#ef4444;color:white;cursor:pointer;font-size:12px;">Clear All</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
        
        let points = [];
        let voronoiLayer = null;
        let markersLayer = L.layerGroup().addTo(map);
        
        const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'];
        
        function updateVoronoi() {
            if (voronoiLayer) map.removeLayer(voronoiLayer);
            if (points.length < 3) return;
            
            const bbox = [-180, -90, 180, 90];
            const fc = turf.featureCollection(points);
            const voronoi = turf.voronoi(fc, { bbox });
            
            if (voronoi) {
                voronoiLayer = L.geoJSON(voronoi, {
                    style: (feature, i) => ({
                        color: colors[feature.properties?.point_index % colors.length] || '#666',
                        fillColor: colors[feature.properties?.point_index % colors.length] || '#666',
                        fillOpacity: 0.15,
                        weight: 2
                    })
                }).addTo(map);
            }
        }
        
        map.on('click', function(e) {
            const pt = turf.point([e.latlng.lng, e.latlng.lat]);
            pt.properties = { point_index: points.length };
            points.push(pt);
            
            L.marker(e.latlng, {
                icon: L.divIcon({ className: '', html: `<div style="width:10px;height:10px;background:${colors[points.length % colors.length]};border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.3);"></div>`, iconSize: [14, 14] })
            }).addTo(markersLayer);
            
            updateVoronoi();
        });
        
        function clearPoints() {
            points = [];
            markersLayer.clearLayers();
            if (voronoiLayer) map.removeLayer(voronoiLayer);
        }
    </script>
</body>
</html>
