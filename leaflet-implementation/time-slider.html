<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Time Slider</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .slider-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(15,23,42,.9); color: #fff; padding: 12px 20px; border-radius: 10px; text-align: center; min-width: 300px; }
        .slider-panel input[type=range] { width: 100%; }
        .slider-panel .time-label { font-size: 15px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="slider-panel">
        <input type="range" id="slider" min="0" max="23" value="12" oninput="updateTime(this.value)">
        <div class="time-label" id="time-label">12:00</div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="time-slider.js"></script>
</body>
</html>
