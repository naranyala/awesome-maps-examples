<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Popup & Tooltip</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .custom-popup .leaflet-popup-content { margin: 8px 12px; }
        .popup-title { font-weight: 700; color: #1e293b; }
        .popup-desc { color: #64748b; font-size: 13px; margin-top: 4px; }
    </style>
</head>
<body>
    
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="popup-tooltip.js"></script>
</body>
</html>
