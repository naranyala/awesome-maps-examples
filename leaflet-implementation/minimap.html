<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Mini Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; }
        #map { height: 100%; }
        #miniMap { width: 200px; height: 150px; position: absolute; bottom: 10px; right: 10px; border: 2px solid #333; border-radius: 4px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="miniMap"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="minimap.js"></script>
</body>
</html>
