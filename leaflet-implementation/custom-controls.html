<!DOCTYPE html>
<html>
<head>
    <title>Leaflet - Custom Controls</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .custom-zoom { background: white; padding: 4px; border-radius: 4px; border: 2px solid rgba(0,0,0,.2); }
        .custom-zoom a { display: block; text-align: center; text-decoration: none; color: #333; font-size: 18px; font-weight: bold; padding: 4px 12px; }
        .custom-zoom a:hover { background: #f4f4f4; }
        .rotate-north-btn { width: 34px; height: 34px; background: white; border: 2px solid rgba(0,0,0,.2); border-radius: 4px; cursor: pointer; font-weight: bold; color: #333; display: flex; align-items: center; justify-content: center; margin-top: 4px; }
        .rotate-north-btn:hover { background: #f4f4f4; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="custom-controls.js"></script>
</body>
</html>
