<!DOCTYPE html>
<html>
<head>
    <title>MapLibre + Turf.js - Voronoi Diagram</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .instructions { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.85); color: white; padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); max-width: 250px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="instructions">
        <strong>📍 Voronoi Diagram</strong><br>
        Click to add points. Voronoi polygons update.
        <br><br>
        <button onclick="clearAll()" style="padding:4px 8px;border-radius:4px;border:none;background:#ef4444;color:white;cursor:pointer;font-size:12px;">Clear All</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-0.09, 51.505], zoom: 10
        });
        
        let points = [];
        let markers = [];
        
        map.on('load', () => {
            map.addSource('voronoi', { type: 'geojson', data: turf.featureCollection([]) });
            map.addLayer({ id: 'voronoi-fill', type: 'fill', source: 'voronoi', paint: { 'fill-color': '#3b82f6', 'fill-opacity': 0.15, 'fill-outline-color': '#3b82f6' } });
            map.getCanvas().style.cursor = 'crosshair';
        });
        
        const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'];
        
        map.on('click', (e) => {
            const pt = turf.point([e.lngLat.lng, e.lngLat.lat]);
            pt.properties = { point_index: points.length };
            points.push(pt);
            
            const el = document.createElement('div');
            el.style.cssText = `width:10px;height:10px;background:${colors[points.length % colors.length]};border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.3);`;
            markers.push(new maplibregl.Marker({ element: el }).setLngLat([e.lngLat.lng, e.lngLat.lat]).addTo(map));
            
            if (points.length >= 3) {
                const bbox = [-180, -90, 180, 90];
                const fc = turf.featureCollection(points);
                const voronoi = turf.voronoi(fc, { bbox });
                if (voronoi) map.getSource('voronoi').setData(voronoi);
            }
        });
        
        function clearAll() {
            points = [];
            markers.forEach(m => m.remove());
            markers = [];
            if (map.getSource('voronoi')) map.getSource('voronoi').setData(turf.featureCollection([]));
        }
    </script>
</body>
</html>
