<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - 3D Buildings</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .controls { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 12px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .controls label { display: block; margin-bottom: 6px; font-size: 13px; }
    </style>
</head>
<body>
    
    <div class="controls">
        <label>Pitch: <input type="range" id="pitch" min="0" max="85" value="60" oninput="map.setPitch(+this.value)"></label>
        <label>Bearing: <input type="range" id="bearing" min="0" max="360" value="-20" oninput="map.setBearing(+this.value)"></label>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-0.09, 51.505],
            zoom: 15,
            pitch: 60,
            bearing: -20
        });
        map.addControl(new maplibregl.NavigationControl());

        // Demo: add some 3D-like buildings using filled extrusions
        const buildings = { type: 'FeatureCollection', features: [] };
        const center = [-0.09, 51.505];
        for (let i = 0; i < 30; i++) {
            const w = 0.001 + Math.random() * 0.002;
            const h = 0.001 + Math.random() * 0.002;
            const x = center[0] + (Math.random() - 0.5) * 0.02;
            const y = center[1] + (Math.random() - 0.5) * 0.01;
            const height = 10 + Math.random() * 80;
            buildings.features.push({ type: 'Feature', properties: { height }, geometry: { type: 'Polygon', coordinates: [[[x, y], [x+w, y], [x+w, y+h], [x, y+h], [x, y]]] } });
        }

        map.on('load', () => {
            map.addSource('buildings', { type: 'geojson', data: buildings });
            map.addLayer({ id: 'buildings-3d', type: 'fill-extrusion', source: 'buildings', paint: {
                'fill-extrusion-color': ['interpolate', ['linear'], ['get', 'height'], 10, '#fee08b', 50, '#d9ef8b', 90, '#91cf60'],
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': 0,
                'fill-extrusion-opacity': 0.8
            }});
        });
    </script>
</body>
</html>
