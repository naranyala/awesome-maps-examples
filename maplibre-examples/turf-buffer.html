<!DOCTYPE html>
<html>
<head>
    <title>MapLibre + Turf.js - Buffer Analysis</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .instructions { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.85); color: white; padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); pointer-events: none; }
    </style>
</head>
<body>
    <div class="instructions">Click anywhere to calculate a 10km Turf.js buffer</div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-74.006, 40.7128],
            zoom: 10
        });

        map.on('load', () => {
            map.addSource('buffer-source', { type: 'geojson', data: turf.featureCollection([]) });
            
            map.addLayer({
                id: 'buffer-fill',
                type: 'fill',
                source: 'buffer-source',
                paint: { 'fill-color': '#10b981', 'fill-opacity': 0.3 }
            });
            
            map.addLayer({
                id: 'buffer-outline',
                type: 'line',
                source: 'buffer-source',
                paint: { 'line-color': '#10b981', 'line-width': 2 }
            });
            
            map.getCanvas().style.cursor = 'crosshair';
        });

        let centerMarker = null;

        map.on('click', function(e) {
            const pt = turf.point([e.lngLat.lng, e.lngLat.lat]);
            const buffered = turf.buffer(pt, 10, { units: 'kilometers' });
            
            map.getSource('buffer-source').setData(buffered);
            
            if (centerMarker) centerMarker.remove();
            centerMarker = new maplibregl.Marker().setLngLat([e.lngLat.lng, e.lngLat.lat]).addTo(map);
        });
    </script>
</body>
</html>
