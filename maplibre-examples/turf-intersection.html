<!DOCTYPE html>
<html>
<head>
    <title>MapLibre + Turf.js - Intersection</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; } #map { height: 100%; width: 100%; }</style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-74.006, 40.7128],
            zoom: 13
        });

        const poly1 = turf.polygon([[[-74.02, 40.72], [-73.99, 40.72], [-73.99, 40.70], [-74.02, 40.70], [-74.02, 40.72]]]);
        const poly2 = turf.polygon([[[-74.01, 40.71], [-73.98, 40.71], [-73.98, 40.69], [-74.01, 40.69], [-74.01, 40.71]]]);
        const intersection = turf.intersect(poly1, poly2);

        map.on('load', () => {
            map.addSource('poly1', { type: 'geojson', data: poly1 });
            map.addSource('poly2', { type: 'geojson', data: poly2 });
            map.addSource('intersect', { type: 'geojson', data: intersection || turf.featureCollection([]) });

            map.addLayer({ id: 'p1', type: 'fill', source: 'poly1', paint: { 'fill-color': '#3b82f6', 'fill-opacity': 0.3 } });
            map.addLayer({ id: 'p2', type: 'fill', source: 'poly2', paint: { 'fill-color': '#ef4444', 'fill-opacity': 0.3 } });
            map.addLayer({ id: 'pi', type: 'fill', source: 'intersect', paint: { 'fill-color': '#10b981', 'fill-opacity': 0.8 } });
        });
    </script>
</body>
</html>
