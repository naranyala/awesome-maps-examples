<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Sync Maps Comparison</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        .map-container { position: absolute; top: 0; bottom: 0; }
        #map-left { left: 0; right: 50%; }
        #map-right { left: 50%; right: 0; }
        .divider { position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background: #3b82f6; cursor: ew-resize; z-index: 10; transform: translateX(-50%); }
        .divider::after { content: '⬌'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #3b82f6; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .label { position: absolute; top: 10px; z-index: 1000; background: rgba(15,23,42,0.8); color: white; padding: 6px 14px; border-radius: 6px; font-size: 13px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); }
        #label-left { left: 10px; }
        #label-right { right: 10px; }
    </style>
</head>
<body>
    <div class="label" id="label-left">🗺️ Street Map</div>
    <div class="label" id="label-right">🛰️ Satellite</div>
    <div id="map-left" class="map-container"></div>
    <div id="map-right" class="map-container"></div>
    <div class="divider" id="divider"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        const center = [-0.09, 51.505];
        const zoom = 13;

        const mapL = new maplibregl.Map({ container: 'map-left', style: 'https://demotiles.maplibre.org/style.json', center, zoom, attributionControl: false });
        const mapR = new maplibregl.Map({ container: 'map-right', style: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', center, zoom, attributionControl: false });

        function sync(src, tgt) { tgt.setCenter(src.getCenter()); tgt.setZoom(src.getZoom()); tgt.setPitch(src.getPitch()); tgt.setBearing(src.getBearing()); }
        mapL.on('move', () => sync(mapL, mapR));
        mapR.on('move', () => sync(mapR, mapL));

        const divider = document.getElementById('divider');
        let dragging = false;
        divider.addEventListener('mousedown', () => dragging = true);
        document.addEventListener('mouseup', () => dragging = false);
        document.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const pct = (e.clientX / window.innerWidth) * 100;
            document.getElementById('map-left').style.right = (100 - pct) + '%';
            document.getElementById('map-right').style.left = pct + '%';
            divider.style.left = pct + '%';
            mapL.resize(); mapR.resize();
        });
    </script>
</body>
</html>
