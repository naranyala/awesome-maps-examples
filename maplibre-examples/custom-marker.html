<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Custom Marker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .custom-marker {
            background-color: #10b981;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: pulse 1.5s infinite;
            cursor: pointer;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-74.006, 40.7128], // New York
            zoom: 12
        });

        // Create a custom HTML element for the marker
        const el = document.createElement('div');
        el.className = 'custom-marker';

        // Add marker to map
        new maplibregl.Marker({ element: el })
            .setLngLat([-74.006, 40.7128])
            .setPopup(new maplibregl.Popup({ offset: 25 }).setHTML('<h3>MapLibre GL JS</h3><p>Custom animated marker in NYC.</p>'))
            .addTo(map);
    </script>
</body>
</html>
