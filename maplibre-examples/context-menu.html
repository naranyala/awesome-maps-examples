<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Context Menu</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .context-menu { position: absolute; background: white; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 100; display: none; padding: 4px 0; min-width: 160px; }
        .context-menu-item { padding: 8px 16px; cursor: pointer; font-size: 14px; }
        .context-menu-item:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="zoomIn()">Zoom In</div>
        <div class="context-menu-item" onclick="zoomOut()">Zoom Out</div>
        <div class="context-menu-item" onclick="addMarker()">Add Marker</div>
        <div class="context-menu-item" onclick="hideMenu()">Close</div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        const map = new maplibregl.Map({ container: 'map', style: 'https://demotiles.maplibre.org/style.json', center: [0, 0], zoom: 2 });
        map.addControl(new maplibregl.NavigationControl());
        const menu = document.getElementById('contextMenu');
        let clickLngLat = null;

        map.getContainer().addEventListener('contextmenu', function(e) {
            e.preventDefault();
            clickLngLat = map.unproject([e.offsetX, e.offsetY]);
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        });
        document.addEventListener('click', function() { menu.style.display = 'none'; });

        function zoomIn() { map.zoomTo(map.getZoom() + 1, { duration: 300 }); }
        function zoomOut() { map.zoomTo(map.getZoom() - 1, { duration: 300 }); }
        function addMarker() {
            if (!clickLngLat) return;
            new maplibregl.Marker({ color: '#ef4444' }).setLngLat(clickLngLat).addTo(map);
        }
        function hideMenu() { menu.style.display = 'none'; }
    </script>
</body>
</html>
