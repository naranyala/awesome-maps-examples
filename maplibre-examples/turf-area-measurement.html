<!DOCTYPE html>
<html>
<head>
    <title>MapLibre + Turf.js - Area Measurement</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .instructions { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.85); color: white; padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); max-width: 280px; font-size: 13px; }
        #area-display { margin-top: 10px; padding: 8px; background: rgba(59,130,246,0.2); border-radius: 4px; font-size: 14px; font-weight: bold; color: #60a5fa; }
    </style>
</head>
<body>
    <div class="instructions">
        <strong>📐 Area Measurement</strong><br>
        Click to add vertices. Double-click to finish.
        <div id="area-display">Area: 0 km²</div>
        <button onclick="clearPolygon()" style="margin-top:8px;padding:4px 8px;border-radius:4px;border:none;background:#ef4444;color:white;cursor:pointer;font-size:12px;">Clear</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-0.09, 51.505], zoom: 11
        });
        
        let vertices = [];
        let markers = [];
        
        map.on('load', () => {
            map.addSource('polygon', { type: 'geojson', data: turf.featureCollection([]) });
            map.addLayer({ id: 'polygon-fill', type: 'fill', source: 'polygon', paint: { 'fill-color': '#3b82f6', 'fill-opacity': 0.2 } });
            map.addLayer({ id: 'polygon-outline', type: 'line', source: 'polygon', paint: { 'line-color': '#3b82f6', 'line-width': 2 } });
            map.getCanvas().style.cursor = 'crosshair';
        });
        
        map.on('click', (e) => {
            vertices.push([e.lngLat.lng, e.lngLat.lat]);
            
            const el = document.createElement('div');
            el.style.cssText = 'width:10px;height:10px;background:#3b82f6;border-radius:50%;border:2px solid white;';
            markers.push(new maplibregl.Marker({ element: el }).setLngLat([e.lngLat.lng, e.lngLat.lat]).addTo(map));
            
            if (vertices.length >= 3) {
                const ring = [...vertices, vertices[0]];
                const poly = turf.polygon([ring]);
                map.getSource('polygon').setData(poly);
                
                const area = turf.area(poly);
                const km2 = (area / 1e6).toFixed(3);
                document.getElementById('area-display').textContent = `Area: ${km2} km²`;
            }
        });
        
        function clearPolygon() {
            vertices = [];
            markers.forEach(m => m.remove());
            markers = [];
            if (map.getSource('polygon')) map.getSource('polygon').setData(turf.featureCollection([]));
            document.getElementById('area-display').textContent = 'Area: 0 km²';
        }
    </script>
</body>
</html>
