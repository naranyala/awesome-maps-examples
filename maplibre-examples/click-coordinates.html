{% block head %}
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<style>
    .coord-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .coord-label { color: var(--text-muted); font-size: 0.9rem; }
    .coord-value { font-size: 1.2rem; font-weight: 600; font-variant-numeric: tabular-nums; color: #10b981; }
    .ping-marker {
        width: 14px; height: 14px; background-color: #10b981;
        border-radius: 50%; border: 2px solid white;
        box-shadow: 0 0 10px rgba(16,185,129,0.8);
        animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes bounceIn {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
</style>
{% endblock %}

{% block controls %}
<p><strong>Click Coordinates</strong><br>Click anywhere on the map to see the coordinates update.</p>
<div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-top: 20px;">
    <div class="coord-row">
        <span class="coord-label">Latitude</span>
        <span class="coord-value" id="lat-val">--</span>
    </div>
    <div class="coord-row" style="margin-bottom: 0;">
        <span class="coord-label">Longitude</span>
        <span class="coord-value" id="lng-val">--</span>
    </div>
</div>
{% endblock %}

{% block script %}
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [-74.006, 40.7128],
        zoom: 12
    });

    map.on('load', () => {
        map.getCanvas().style.cursor = 'crosshair';
    });

    const latEl = document.getElementById('lat-val');
    const lngEl = document.getElementById('lng-val');
    let currentMarker = null;

    map.on('click', function(e) {
        latEl.textContent = e.lngLat.lat.toFixed(5);
        lngEl.textContent = e.lngLat.lng.toFixed(5);
        
        if (currentMarker) currentMarker.remove();
        
        const el = document.createElement('div');
        el.className = 'ping-marker';
        
        currentMarker = new maplibregl.Marker({ element: el })
            .setLngLat([e.lngLat.lng, e.lngLat.lat])
            .addTo(map);
            
        map.panTo([e.lngLat.lng, e.lngLat.lat], { duration: 800 });
    });
</script>
{% endblock %}
