<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OpenLayers - Time Slider</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>body, html, #map { margin: 0; height: 100%; width: 100%; font-family: sans-serif; }
    .slider-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(15,23,42,.9); color: #fff; padding: 12px 20px; border-radius: 10px; text-align: center; min-width: 300px; }
    .slider-panel input[type=range] { width: 100%; }
    .slider-panel .time-label { font-size: 15px; font-weight: 700; margin-top: 4px; }</style>
</head>
<body>
    <div class="slider-panel">
        <input type="range" id="slider" min="0" max="23" value="12" oninput="updateTime(this.value)">
        <div class="time-label" id="time-label">12:00</div>
    </div>
    <div id="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        // Pre-generate 24 hours of data
        const hourlyData = [];
        for (let h = 0; h < 24; h++) {
            const features = [];
            for (let i = 0; i < 30; i++) {
                features.push(new ol.Feature({
                    geometry: new ol.geom.Point(ol.proj.fromLonLat([-0.09 + (Math.random()-0.5)*0.1, 51.505 + (Math.random()-0.5)*0.08])),
                    intensity: Math.max(0, Math.sin((h - 6) * Math.PI / 12) + Math.random() * 0.3)
                }));
            }
            hourlyData.push(features);
        }

        const source = new ol.source.Vector({ features: hourlyData[12] });
        const vectorLayer = new ol.layer.Vector({
            source,
            style: function(f) {
                const intensity = f.get('intensity');
                const color = intensity > 0.7 ? '#ef4444' : intensity > 0.3 ? '#f59e0b' : '#3b82f6';
                return new ol.style.Style({ image: new ol.style.Circle({ radius: 3 + intensity * 10, fill: new ol.style.Fill({ color, opacity: 0.7 }) }) });
            }
        });

        const map = new ol.Map({
            target: 'map',
            layers: [new ol.layer.Tile({ source: new ol.source.OSM() }), vectorLayer],
            view: new ol.View({ center: ol.proj.fromLonLat([-0.09, 51.505]), zoom: 12 })
        });

        function updateTime(h) {
            const hour = parseInt(h);
            document.getElementById('time-label').textContent = hour.toString().padStart(2, '0') + ':00';
            source.clear();
            source.addFeatures(hourlyData[hour]);
        }
    </script>
</body>
</html>
