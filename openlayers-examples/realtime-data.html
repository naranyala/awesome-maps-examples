<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OpenLayers - Realtime Data</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>body, html, #map { margin: 0; height: 100%; width: 100%; font-family: sans-serif; }
    .status { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(15,23,42,.85); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; }
    .live-dot { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; margin-right: 6px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }</style>
</head>
<body>
    <div class="status"><span class="live-dot"></span><span id="count">0</span> points live</div>
    <div id="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        const source = new ol.source.Vector();
        const vectorLayer = new ol.layer.Vector({
            source,
            style: new ol.style.Style({ image: new ol.style.Circle({ radius: 5, fill: new ol.style.Fill({ color: '#3b82f6' }), stroke: new ol.style.Stroke({ color: '#fff', width: 2 }) }) })
        });

        const map = new ol.Map({
            target: 'map',
            layers: [new ol.layer.Tile({ source: new ol.source.OSM() }), vectorLayer],
            view: new ol.View({ center: ol.proj.fromLonLat([-0.09, 51.505]), zoom: 12 })
        });

        function addRandomPoint() {
            const feature = new ol.Feature({
                geometry: new ol.geom.Point(ol.proj.fromLonLat([-0.09 + (Math.random()-0.5)*0.1, 51.505 + (Math.random()-0.5)*0.08]))
            });
            source.addFeature(feature);
            if (source.getFeatures().length > 50) source.removeFeature(source.getFeatures()[0]);
            document.getElementById('count').textContent = source.getFeatures().length;
        }

        for (let i = 0; i < 10; i++) addRandomPoint();
        setInterval(addRandomPoint, 800);
    </script>
</body>
</html>
