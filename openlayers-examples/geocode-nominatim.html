<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OpenLayers - Geocode with Nominatim</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>body, html, #map { margin: 0; height: 100%; width: 100%; font-family: sans-serif; }
    .search-box { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 12px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
    .search-box input { width: 250px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .search-box button { padding: 8px 12px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 4px; }
    #results { position: absolute; top: 60px; right: 10px; z-index: 1000; background: white; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); max-height: 300px; overflow-y: auto; display: none; width: 260px; }
    .result-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
    .result-item:hover { background: #f0f4ff; }</style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search location..." />
        <button onclick="search()">Search</button>
    </div>
    <div id="results"></div>
    <div id="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        const map = new ol.Map({
            target: 'map',
            layers: [new ol.layer.Tile({ source: new ol.source.OSM() })],
            view: new ol.View({ center: [0, 0], zoom: 2 })
        });
        map.addControl(new ol.control.FullScreen());

        let marker = null;
        document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });

        async function search() {
            const query = document.getElementById('search-input').value;
            if (!query) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
            const data = await res.json();
            const results = document.getElementById('results');
            results.innerHTML = '';
            if (data.length === 0) { results.style.display = 'none'; return; }
            results.style.display = 'block';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.textContent = item.display_name;
                div.onclick = () => {
                    map.getView().animate({ center: ol.proj.fromLonLat([parseFloat(item.lon), parseFloat(item.lat)]), zoom: 15, duration: 1000 });
                    if (marker) map.removeOverlay(marker);
                    const el = document.createElement('div');
                    el.innerHTML = '📍';
                    el.style.fontSize = '24px';
                    marker = new ol.Overlay({ element: el, position: ol.proj.fromLonLat([parseFloat(item.lon), parseFloat(item.lat)]), positioning: 'bottom-center' });
                    map.addOverlay(marker);
                    results.style.display = 'none';
                };
                results.appendChild(div);
            });
        }
    </script>
</body>
</html>
