<!DOCTYPE html>
<html>
<head>
    <title>OpenLayers - Custom Controls</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        body, html, #map { margin: 0; height: 100%; width: 100%; font-family: sans-serif; }
        .rotate-north { top: 65px; left: .5em; }
        .ol-touch .rotate-north { top: 80px; }
        .custom-control { position: absolute; background: white; padding: 2px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        class RotateNorthControl extends ol.control.Control {
            constructor(opt_options) {
                const options = opt_options || {};
                const button = document.createElement('button');
                button.innerHTML = 'N';
                button.title = 'Rotate North';
                const element = document.createElement('div');
                element.className = 'rotate-north custom-control ol-unselectable ol-control';
                element.appendChild(button);
                super({ element: element, target: options.target });
                button.addEventListener('click', this.handleRotateNorth.bind(this), false);
            }
            handleRotateNorth() {
                this.getMap().getView().setRotation(0);
            }
        }

        const map = new ol.Map({
            controls: ol.control.defaults.defaults().extend([new RotateNorthControl()]),
            target: 'map',
            layers: [ new ol.layer.Tile({ source: new ol.source.OSM() }) ],
            view: new ol.View({ center: [0, 0], zoom: 3, rotation: Math.PI / 4 }) // Starts rotated
        });
    </script>
</body>
</html>
