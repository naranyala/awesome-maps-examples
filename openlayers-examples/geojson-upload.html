<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OpenLayers - GeoJSON Upload</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>body, html, #map { margin: 0; height: 100%; width: 100%; font-family: sans-serif; }
    .drop-zone { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 320px; padding: 40px; background: rgba(15,23,42,.85); color: #fff; border: 2px dashed rgba(255,255,255,.3); border-radius: 16px; text-align: center; pointer-events: auto; }
    .drop-zone.dragover { border-color: #3b82f6; background: rgba(59,130,246,.2); }
    .drop-zone p { margin: 0; font-size: 15px; }
    .drop-zone small { color: #94a3b8; }
    .feature-count { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15,23,42,.85); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 13px; display: none; }</style>
</head>
<body>
    <div class="feature-count" id="feature-count"></div>
    <div class="drop-zone" id="drop-zone">
        <p>📁 Drop a GeoJSON file here</p>
        <small>or click to select</small>
        <input type="file" id="file-input" accept=".geojson,.json" style="display:none">
    </div>
    <div id="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol-ext.js"></script>
    <script>
        const vectorSource = new ol.source.Vector();
        const vectorLayer = new ol.layer.Vector({
            source: vectorSource,
            style: new ol.style.Style({ fill: new ol.style.Fill({ color: 'rgba(59,130,246,0.4)' }), stroke: new ol.style.Stroke({ color: '#3b82f6', width: 2 }), image: new ol.style.Circle({ radius: 6, fill: new ol.style.Fill({ color: '#3b82f6' }), stroke: new ol.style.Stroke({ color: '#fff', width: 2 }) }) })
        });
        const map = new ol.Map({ target: 'map', layers: [new ol.layer.Tile({ source: new ol.source.OSM() }), vectorLayer], view: new ol.View({ center: [0, 20], zoom: 2 }) });

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const geojson = JSON.parse(e.target.result);
                    const format = new ol.format.GeoJSON();
                    const features = format.readFeatures(geojson, { featureProjection: 'EPSG:3857' });
                    vectorSource.clear();
                    vectorSource.addFeatures(features);
                    const count = features.length;
                    document.getElementById('feature-count').textContent = '✅ ' + count + ' feature(s) loaded';
                    document.getElementById('feature-count').style.display = 'block';
                    const extent = vectorSource.getExtent();
                    map.getView().fit(extent, { padding: [50, 50, 50, 50], maxZoom: 15 });
                    dropZone.style.display = 'none';
                } catch (err) { alert('Invalid GeoJSON file'); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
