<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - GeoJSON Upload</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .drop-zone { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 320px; padding: 40px; background: rgba(15,23,42,.85); color: #fff; border: 2px dashed rgba(255,255,255,.3); border-radius: 16px; text-align: center; pointer-events: auto; }
        .drop-zone.dragover { border-color: #3b82f6; background: rgba(59,130,246,.2); }
        .drop-zone p { margin: 0; font-size: 15px; }
        .drop-zone small { color: #94a3b8; }
        .feature-count { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(15,23,42,.85); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 13px; display: none; }
    </style>
</head>
<body>
    
    <div class="feature-count" id="feature-count"></div>
    <div class="drop-zone" id="drop-zone">
        <p>📁 Drop a GeoJSON file here</p>
        <small>or click to select</small>
        <input type="file" id="file-input" accept=".geojson,.json" style="display:none">
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="geojson-upload.js"></script>
    <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

<!-- INJECTED MAP CONTROL SCRIPT -->
<script>
window.addEventListener('message', function(e) {
    if(!e.data || typeof map === 'undefined') return;
    try {
        const action = e.data.action;
        const lib = e.data.library; 
        
        if (action === 'zoom_in') {
            if (lib === 'leaflet' || lib === 'maplibre') map.zoomIn();
            else if (lib === 'openlayers') map.getView().animate({zoom: map.getView().getZoom() + 1, duration: 250});
        }
        else if (action === 'zoom_out') {
            if (lib === 'leaflet' || lib === 'maplibre') map.zoomOut();
            else if (lib === 'openlayers') map.getView().animate({zoom: map.getView().getZoom() - 1, duration: 250});
        }
        else if (action === 'pan') {
            const dx = e.data.dx || 0;
            const dy = e.data.dy || 0;
            if (lib === 'leaflet') map.panBy([dx, dy]);
            else if (lib === 'maplibre') map.panBy([dx, dy], {duration: 250});
            else if (lib === 'openlayers') {
                const view = map.getView();
                const center = view.getCenter();
                const res = view.getResolution();
                view.animate({center: [center[0] + dx * res, center[1] - dy * res], duration: 250});
            }
        }
    } catch(err) { console.warn('Map control injection failed:', err); }
});
</script>

</body>
</html>
