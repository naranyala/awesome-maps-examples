<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Hover Effect</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .tooltip { position: absolute; z-index: 1000; background: rgba(15,23,42,.9); color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px; pointer-events: none; display: none; }
    </style>
</head>
<body>
    
    <div class="tooltip" id="tooltip"></div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="hover-effect.js"></script>
</body>
</html>
