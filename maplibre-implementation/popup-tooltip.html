<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Popup & Tooltip</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .tooltip { position: absolute; z-index: 1000; background: rgba(30,41,59,0.95); color: white; padding: 6px 12px; border-radius: 6px; font-size: 13px; pointer-events: none; display: none; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="tooltip" id="tooltip"></div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="popup-tooltip.js"></script>
</body>
</html>
