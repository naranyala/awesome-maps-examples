<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Animate Line</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .controls { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 12px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .controls button { padding: 8px 16px; border: none; border-radius: 4px; background: #3b82f6; color: white; cursor: pointer; font-size: 13px; }
        .controls button:hover { background: #2563eb; }
    </style>
</head>
<body>
    
    <div class="controls"><button onclick="animateLine()">▶ Play Animation</button></div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="animate-line.js"></script>
</body>
</html>
