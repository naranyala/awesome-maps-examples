<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Draw Polygon</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; display: flex; }
        #sidebar { width: 280px; padding: 16px; background: #1e293b; color: #e2e8f0; display: flex; flex-direction: column; padding-top: 60px; box-sizing: border-box; }
        #map { flex: 1; height: 100%; }
        #feature-list { flex: 1; overflow-y: auto; font-size: 13px; }
        .stat { margin-bottom: 8px; padding: 8px; background: #0f172a; border-radius: 4px; }
    </style>
</head>
<body>
    
    <div id="sidebar">
        <h3>Drawing Stats</h3>
        <div class="stat">Features: <strong id="count">0</strong></div>
        <div class="stat">Total Area: <strong id="area">0</strong> km²</div>
        <div id="feature-list"></div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.js"></script>
    <script src="drawing-tools.js"></script>
</body>
</html>
