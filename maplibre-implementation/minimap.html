<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Mini Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; display: flex; }
        #mainMap { flex: 1; }
        #miniMap { width: 200px; height: 150px; position: absolute; bottom: 10px; right: 10px; border: 2px solid #333; border-radius: 4px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="mainMap"></div>
    <div id="miniMap"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="minimap.js"></script>
</body>
</html>
