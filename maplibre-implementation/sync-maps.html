<!DOCTYPE html>
<html>
<head>
    <title>MapLibre - Sync Maps</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; display: flex; font-family: sans-serif; overflow: hidden; }
        .map-container { flex: 1; height: 100%; border-right: 2px solid #ccc; }
        .map-container:last-child { border-right: none; }
        .controls { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>
    <div class="controls"><strong>Synchronized Maps</strong><br/>Pan or zoom one map, the other follows.</div>
    <div id="map1" class="map-container"></div>
    <div id="map2" class="map-container"></div>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="sync-maps.js"></script>
</body>
</html>
